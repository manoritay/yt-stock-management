<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock Management System</title>
  <style>
    :root {
      --bg: #f2f6f7;
      --card: #ffffff;
      --ink: #1f2a2e;
      --muted: #5f7078;
      --accent: #0f766e;
      --line: #d9e2e7;
    }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #dcefed, #f2f6f7 40%);
    }
    .wrap { max-width: 1200px; margin: 28px auto; padding: 0 16px; }
    .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; box-shadow: 0 8px 20px rgba(0,0,0,.04); }
    h1 { margin: 0 0 12px; font-size: 1.4rem; }
    .controls { display: grid; grid-template-columns: 1.2fr 1fr auto; gap: 12px; align-items: end; }
    label { font-size: .9rem; color: var(--muted); display: block; margin-bottom: 6px; }
    input, select, button { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid var(--line); border-radius: 8px; font-size: .95rem; }
    button { background: var(--accent); color: #fff; border: 0; cursor: pointer; padding: 10px 14px; min-height: 44px; }
    input, select { min-height: 44px; }
    .meta { margin: 10px 0 2px; color: var(--muted); font-size: .9rem; }
    .table-wrap { overflow: auto; -webkit-overflow-scrolling: touch; margin-top: 14px; border: 1px solid var(--line); border-radius: 10px; position: relative; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; background: #fff; }
    th, td { border-bottom: 1px solid #eef3f5; padding: 10px; text-align: left; font-size: .92rem; }
    th { position: sticky; top: 0; background: #f7fbfb; z-index: 1; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .scroll-hint { display: none; font-size: .78rem; color: var(--muted); text-align: center; margin-top: 6px; padding-bottom: 2px; }
    @media (max-width: 760px) {
      .wrap { margin: 10px auto; }
      .panel { padding: 12px; border-radius: 8px; }
      h1 { font-size: 1.15rem; }
      .controls { grid-template-columns: 1fr; }
      select[multiple] { size: 4; }
      th, td { padding: 8px 6px; font-size: .82rem; white-space: nowrap; }
      th:first-child, td:first-child {
        position: sticky;
        left: 0;
        z-index: 2;
        box-shadow: 2px 0 4px rgba(0,0,0,.06);
      }
      th:first-child { background: #f7fbfb; }
      td:first-child { background: #fff; }
      .scroll-hint { display: block; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Stock Management System</h1>
      <div class="controls">
        <div>
          <label for="tabFilter">Filter By Tab Name</label>
          <select id="tabFilter" multiple size="6"></select>
        </div>
        <div>
          <label for="search">Search Item Name</label>
          <input id="search" placeholder="Type part of item name..." />
        </div>
        <div>
          <button id="clearBtn" type="button">Clear Filters</button>
        </div>
      </div>
      <div class="meta" id="meta"></div>
      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Tab Name</th>
              <th>Item Name</th>
              <th>On Hand Availability</th>
              <th>Size</th>
              <th>Cost</th>
              <th>Price</th>
              <th>Actual Sold</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <p class="scroll-hint">&#8592; Swipe to scroll &#8594;</p>
    </div>
  </div>
